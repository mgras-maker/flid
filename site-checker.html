<!DOCTYPE html>
<html>
<head>
  <title>FLID Site Checker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      line-height: 1.6;
    }
    .result {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .success {
      color: green;
      font-weight: bold;
    }
    .error {
      color: red;
      font-weight: bold;
    }
    button {
      padding: 10px 15px;
      background-color: #0078d4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>FLID Website Status Checker</h1>
  <p>Click the button below to check if the FLID Foundation website is loading correctly.</p>
  
  <button id="checkBtn">Check Website Status</button>
  
  <div id="result" class="result"></div>
  
  <script>
    document.getElementById('checkBtn').addEventListener('click', async function() {
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = 'Checking website status...';
      
      try {
        // Check the main HTML
        const response = await fetch('https://mgras-maker.github.io/flid/');
        const html = await response.text();
        
        let status = '<div class="success">✓ Main HTML loaded successfully</div>';
        
        // Check for common errors in the HTML
        if (html.includes('src="/src/main.tsx"')) {
          status += '<div class="error">✗ Found incorrect script path: /src/main.tsx</div>';
        } else if (html.includes('src="./assets/index-')) {
          status += '<div class="success">✓ Script path is correctly set to relative path</div>';
        } else if (html.includes('type="module" src="')) {
          status += '<div class="success">✓ Script tag present with correct format</div>';
        }
        
        // Look for assets
        const assetMatches = html.match(/src="\.\/assets\/([^"]+)"/g);
        if (assetMatches && assetMatches.length > 0) {
          status += '<div class="success">✓ Found ' + assetMatches.length + ' asset references</div>';
          
          // Try to fetch the first asset
          const assetPath = assetMatches[0].replace('src="', '').replace('"', '');
          try {
            const assetResponse = await fetch('https://mgras-maker.github.io/flid' + assetPath.substring(1));
            if (assetResponse.ok) {
              status += '<div class="success">✓ Successfully loaded an asset: ' + assetPath + '</div>';
            } else {
              status += '<div class="error">✗ Failed to load asset: ' + assetPath + '</div>';
            }
          } catch (err) {
            status += '<div class="error">✗ Error fetching asset: ' + err.message + '</div>';
          }
        } else {
          status += '<div class="error">✗ No asset references found in HTML</div>';
        }
        
        resultDiv.innerHTML = status;
      } catch (error) {
        resultDiv.innerHTML = '<div class="error">Error checking website: ' + error.message + '</div>';
      }
    });
  </script>
</body>
</html>
