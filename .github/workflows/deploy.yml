name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build for GitHub Pages
        run: |
          $env:NODE_ENV = "production"
          npm run build
      
      - name: Fix paths for GitHub Pages
        shell: pwsh
        run: |
          $indexPath = "dist\index.html"
          $content = Get-Content -Path $indexPath -Raw
          $content = $content -replace 'src="/', 'src="/flid/'
          $content = $content -replace 'href="/', 'href="/flid/'
          $content = $content -replace 'src="/flid/flid/', 'src="/flid/'
          $content = $content -replace 'href="/flid/flid/', 'href="/flid/'
          Set-Content -Path $indexPath -Value $content
      
      - name: Copy 404.html
        run: copy public\404.html dist\404.html
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
