name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3
        
      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies 📦
        run: npm ci --legacy-peer-deps
        
      - name: Build project 🏗️
        run: |
          $env:NODE_ENV="production"
          npm run build
        shell: pwsh
          
      - name: Fix paths in index.html 🔧
        run: |
          # Find the main JS file
          $jsFile = Get-ChildItem -Path "dist/assets" -Filter "index-*.js" | Select-Object -First 1
          
          # Create a new index.html from template
          $templateContent = Get-Content "public/index.html.template" -Raw
          $newIndexContent = $templateContent -replace '</body>', "<script type=`"module`" src=`"./assets/$($jsFile.Name)`"></script>`n  </body>"
          
          # Replace the old index.html
          Set-Content -Path "dist/index.html" -Value $newIndexContent
          
          # Fix any remaining absolute paths
          $indexContent = Get-Content "dist/index.html" -Raw
          $indexContent = $indexContent -replace '(src|href)="/', '$1="./'
          Set-Content -Path "dist/index.html" -Value $indexContent
          
          # Create .nojekyll file
          New-Item -Path "dist/.nojekyll" -ItemType File -Force | Out-Null
          
          # Copy 404.html for SPA routing
          Copy-Item -Path "public/404.html" -Destination "dist/404.html" -Force
        shell: pwsh
      
      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true