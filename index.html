    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;700&display=swap" rel="stylesheet">
    
    <!-- GitHub Pages SPA redirect script -->
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
      <!-- Preload only essential resources that are actually used right away -->
    <!-- Removed logo preload that wasn't being used in the initial view -->
    
    <!-- Preconnect to Google Fonts to speed up loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <title>FLID Foundation | Balance through design</title>
  </head>

    <div id="root"></div>
    <!-- Script path will be fixed by fix-index-paths.ps1 for GitHub Pages -->

  </body>
